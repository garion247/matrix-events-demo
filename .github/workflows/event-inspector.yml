name: Event Inspector

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      dump_full_payload:
        description: 'Print full event JSON'
        required: false
        type: boolean
        default: false

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Common context
        run: |
          echo "Event:      ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor:      ${{ github.actor }}"
          echo "Ref:        ${{ github.ref }}"
          echo "Ref name:   ${{ github.ref_name }}"
          echo "SHA:        ${{ github.sha }}"

      - name: Push details
        if: github.event_name == 'push'
        run: |
          echo "Before: ${{ github.event.before }}"
          echo "After:  ${{ github.event.after }}"
          echo "Forced: ${{ github.event.forced }}"
          echo "Head commit message: ${{ github.event.head_commit.message }}"
          echo "Head commit author:  ${{ github.event.head_commit.author.name }}"

      - name: Pull request details
        if: github.event_name == 'pull_request'
        run: |
          echo "Action: ${{ github.event.action }}"
          echo "PR #:   ${{ github.event.pull_request.number }}"
          echo "Title:  ${{ github.event.pull_request.title }}"
          echo "Author: ${{ github.event.pull_request.user.login }}"
          echo "Base:   ${{ github.event.pull_request.base.ref }}"
          echo "Head:   ${{ github.event.pull_request.head.ref }}"
          echo "Draft:  ${{ github.event.pull_request.draft }}"

      - name: Manual dispatch details
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Dump payload: ${{ inputs.dump_full_payload }}"

      - name: Full event JSON
        if: github.event_name == 'workflow_dispatch' && inputs.dump_full_payload == 'true'
        run: echo '${{ toJSON(github.event) }}' | jq .
